<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💳 私人帳本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #c9a84c;
    --accent2: #e8c96e;
    --red: #e05c5c;
    --green: #5cb88a;
    --text: #e8e8f0;
    --text2: #8888aa;
    --text3: #55556a;
    --font: 'Noto Sans TC', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
  }

  /* ── LOCK SCREEN ── */
  #lock-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 999;
    flex-direction: column;
    gap: 0;
  }

  .lock-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px 40px;
    width: 340px;
    text-align: center;
    animation: fadeUp .5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lock-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }

  .lock-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: .02em;
  }

  .lock-sub {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 32px;
  }

  .pw-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 18px;
    color: var(--text);
    font-family: var(--mono);
    letter-spacing: .3em;
    text-align: center;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 16px;
  }

  .pw-input:focus { border-color: var(--accent); }

  .pw-input.shake {
    animation: shake .3s ease;
    border-color: var(--red);
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-6px); }
    80%      { transform: translateX(6px); }
  }

  .btn-unlock {
    width: 100%;
    background: var(--accent);
    color: #0f0f13;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font);
    transition: background .2s, transform .1s;
  }

  .btn-unlock:hover { background: var(--accent2); }
  .btn-unlock:active { transform: scale(.98); }

  .lock-err {
    font-size: 13px;
    color: var(--red);
    margin-top: 12px;
    height: 18px;
    transition: opacity .2s;
  }

  /* ── SIDEBAR (matches existing site) ── */
  #app { display: none; }

  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 220px;
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 100;
    overflow-y: auto;
  }

  .sidebar-brand {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
    padding: 0 4px;
  }

  .sidebar-trip {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    padding: 0 4px;
    margin-bottom: 2px;
  }

  .sidebar-dates {
    font-size: 11px;
    color: var(--text2);
    padding: 0 4px;
    margin-bottom: 20px;
  }

  .sidebar-section {
    font-size: 10px;
    letter-spacing: .12em;
    color: var(--text3);
    text-transform: uppercase;
    padding: 4px 4px 2px;
    margin-top: 8px;
  }

  .sidebar a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 10px;
    font-size: 13px;
    color: var(--text2);
    text-decoration: none;
    transition: background .15s, color .15s;
  }

  .sidebar a:hover { background: var(--surface2); color: var(--text); }
  .sidebar a.active { background: rgba(201,168,76,.12); color: var(--accent); font-weight: 600; }

  /* ── MAIN ── */
  .main {
    margin-left: 220px;
    padding: 32px 32px 80px;
    max-width: 900px;
  }

  .page-header {
    margin-bottom: 28px;
    animation: fadeUp .4s ease;
  }

  .page-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .page-title span { color: var(--accent); }

  .page-sub {
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
  }

  /* ── SUMMARY CARDS ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 28px;
    animation: fadeUp .4s ease .05s both;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }

  .card-value {
    font-size: 22px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text);
  }

  .card-value.income { color: var(--green); }
  .card-value.expense { color: var(--red); }

  /* ── ADD FORM ── */
  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 24px;
    animation: fadeUp .4s ease .1s both;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-full { grid-column: 1/-1; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 6px;
  }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    transition: border-color .2s;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--accent); }

  select option { background: var(--surface2); }

  textarea { resize: vertical; min-height: 60px; }

  .btn-add {
    background: var(--accent);
    color: #0f0f13;
    border: none;
    border-radius: 10px;
    padding: 11px 24px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font);
    transition: background .2s;
  }

  .btn-add:hover { background: var(--accent2); }

  /* ── TABLE ── */
  .table-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp .4s ease .15s both;
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
  }

  .table-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-refresh {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--font);
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  .btn-refresh.spinning .refresh-icon { animation: spin .6s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    padding: 10px 14px;
    text-align: left;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    background: var(--surface2);
    font-weight: 500;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 12px 14px;
    color: var(--text);
    vertical-align: middle;
  }

  .td-amount {
    font-family: var(--mono);
    font-weight: 500;
    color: var(--red);
  }

  .td-amount.income { color: var(--green); }

  .td-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
  }

  .td-note {
    font-size: 12px;
    color: var(--text2);
    max-width: 140px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-lender { background: rgba(92,184,138,.15); color: var(--green); }
  .badge-payer  { background: rgba(224,92,92,.15);  color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 48px;
    color: var(--text3);
    font-size: 14px;
  }

  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 14px;
    color: var(--text);
    z-index: 9999;
    opacity: 0;
    transform: translateY(10px);
    transition: all .3s ease;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 20px 16px 60px; }
    .cards { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-grid-2 { grid-template-columns: 1fr; }
    table { font-size: 12px; }
    thead th:nth-child(4), tbody td:nth-child(4),
    thead th:nth-child(5), tbody td:nth-child(5) { display: none; }
  }

  /* loading dots */
  .loading-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 2px;
    animation: dot 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: .2s; }
  .loading-dots span:nth-child(3) { animation-delay: .4s; }

  @keyframes dot {
    0%,80%,100% { transform: scale(.6); opacity: .4; }
    40% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<!-- ══ LOCK SCREEN ══ -->
<div id="lock-screen">
  <div class="lock-box">

    <div class="lock-title">私人帳本</div>

<!-- ══ MAIN APP ══ -->
<div id="app">

  <!-- Sidebar -->
  <nav class="sidebar">

    <div class="sidebar-dates">5/27 – 6/1 ｜ 首爾 6 天</div>

    <div class="sidebar-section">主要功能</div>
    <a href="https://mantou0613.github.io/korea-trip/index.html">🗓️ 行程秘笈</a>

    <div class="add-section">

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────
const PASSWORD   = '2oxiuuil';
const SHEET_ID   = '1VjfzTkD73H4AXVh7eYPG9jJ66hOxS8H6w6yqIedBu0c';
const SHEET_NAME = 'Sheet1'; // Google Sheet 分頁名稱
const GAS_URL    = 'https://script.google.com/macros/s/AKfycby2uoCy3chAq4YoL5LzekBvDh0ZBofbdMB9APAxVNMV7GwTu0FvlthgHw0VIv41H-qP0g/exec';

let sheetRecords = [];  // 從 Google Sheet 讀進來的資料
let localRecords = [];  // 新增但還沒寫入 Sheet 的暫存

// ── LOCK ────────────────────────────────────────────
const pwInput = document.getElementById('pw-input');
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

function unlock() {
  if (pwInput.value === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('f-date').valueAsDate = new Date();
    loadSheet();
  } else {
    const err = document.getElementById('lock-err');
    err.textContent = '密碼錯誤，請再試一次';
    pwInput.classList.add('shake');
    pwInput.value = '';
    setTimeout(() => { pwInput.classList.remove('shake'); err.textContent = ''; }, 1200);
  }
}

// ── SHEET READ（透過 Apps Script，無 CORS 問題）────────
async function loadSheet() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  try {
    // 先嘗試 GAS，失敗再 fallback 到 gviz
    let loaded = false;

    // 方法一：Apps Script GET
    try {
      const res  = await fetch(GAS_URL + '?action=read');
      const text = await res.text();
      // 確認不是 HTML 錯誤頁
      if (text.trim().startsWith('{')) {
        const json = JSON.parse(text);
        if (json.data && Array.isArray(json.data)) {
          const [header, ...rows] = json.data;
          sheetRecords = rows
            .filter(row => row && row.some(cell => String(cell).trim() !== ''))
            .map(row => {
              const obj = {};
              header.forEach((h, i) => obj[String(h).trim()] = String(row[i] ?? '').trim());
              return obj;
            })
            .filter(r => r['日期'] || r['項目']);
          loaded = true;
        }
      }
    } catch(e1) {
      console.warn('GAS read failed:', e1);
    }

    // 方法二：fallback gviz CSV（最穩定）
    if (!loaded) {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
      const res  = await fetch(url);
      const text = await res.text();
      sheetRecords = parseCSV(text);
      loaded = true;
    }

    renderTable();
    updateCards();
    showToast(`✅ 已讀取 ${sheetRecords.length} 筆記錄`);
  } catch(e) {
    console.error('loadSheet error:', e);
    showToast('⚠️ 讀取失敗：' + e.message);
    renderTable();
    updateCards();
  }
  btn.classList.remove('spinning');
}

// ── CSV PARSER (fallback) ──────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const header = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line => {
    // 處理欄位內有逗號的情況（用引號包住）
    const vals = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const obj = {};
    header.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g,'').trim());
    return obj;
  }).filter(r => r['日期'] || r['項目']);
}

// ── ADD RECORD ───────────────────────────────────────
function addRecord() {
  const date   = document.getElementById('f-date').value;
  const item   = document.getElementById('f-item').value.trim();
  const amount = document.getElementById('f-amount').value;
  const lender = document.getElementById('f-lender').value;
  const payer  = document.getElementById('f-payer').value;
  const note   = document.getElementById('f-note').value.trim();

  if (!date || !item || !amount) {
    showToast('⚠️ 請填寫日期、項目、金額');
    return;
  }

  const rec = { '日期': date, '項目': item, '總費用': amount, '借款方': lender, '代付方': payer, '附註': note, _local: true };

  // 1. 立刻加入本地，畫面馬上出現
  localRecords.unshift(rec);
  renderTable();
  updateCards();

  // 2. 清空表單
  document.getElementById('f-item').value   = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-lender').value = '';
  document.getElementById('f-payer').value  = '';
  document.getElementById('f-note').value   = '';
  document.getElementById('f-date').valueAsDate = new Date();

  showToast('⏳ 正在寫入 Google Sheet…');

  // 3. 寫入 Google Sheet
  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ '日期': date, '項目': item, '總費用': amount, '借款方': lender, '代付方': payer, '附註': note })
  }).then(() => {
    // 寫入成功：把本地暫存移除，重新從 Sheet 讀（Sheet 已有這筆了）
    localRecords = localRecords.filter(r => r !== rec);
    showToast('✅ 已寫入 Google Sheet！');
    setTimeout(() => loadSheet(), 1800); // 等 Sheet 更新後再讀
  }).catch(() => {
    showToast('⚠️ 寫入失敗，記錄保留在本地');
    // 不移除 localRecords，讓使用者還能看到
  });
}

// ── RENDER ───────────────────────────────────────────
function renderTable() {
  // 合併：本地暫存在前（橘點標示），Sheet 資料在後
  const all  = [...localRecords, ...sheetRecords];
  const wrap = document.getElementById('table-wrap');

  if (all.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div>還沒有記錄，在上方新增吧！</div>`;
    return;
  }

  const rows = all.map(r => {
    const amt    = parseFloat(String(r['總費用']).replace(/[^0-9.]/g,'') || 0);
    const amtStr = amt ? `NT$ ${amt.toLocaleString()}` : '—';
    const tag    = r._local ? '<span style="font-size:10px;color:var(--accent);margin-left:4px" title="寫入中">●</span>' : '';
    return `<tr>
      <td class="td-date">${r['日期'] || '—'}</td>
      <td>${r['項目'] || '—'}${tag}</td>
      <td class="td-amount">${amtStr}</td>
      <td>${r['借款方'] ? `<span class="badge badge-lender">${r['借款方']}</span>` : '—'}</td>
      <td>${r['代付方'] ? `<span class="badge badge-payer">${r['代付方']}</span>` : '—'}</td>
      <td class="td-note">${r['附註'] || '—'}</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table>
    <thead><tr>
      <th>日期</th><th>項目</th><th>總費用</th><th>借款方</th><th>代付方</th><th>附註</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function updateCards() {
  const all   = [...localRecords, ...sheetRecords];
  let   total = 0;
  all.forEach(r => {
    total += parseFloat(String(r['總費用']).replace(/[^0-9.]/g,'') || 0);
  });
  document.getElementById('sum-expense').textContent = `NT$ ${total.toLocaleString()}`;
  document.getElementById('sum-income').textContent  = `NT$ 0`;
  document.getElementById('sum-count').textContent   = `${all.length} 筆`;
}

// ── TOAST ────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
