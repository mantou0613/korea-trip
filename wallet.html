<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💳 私人帳本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e; --border: #2e2e3e;
    --accent: #c9a84c; --accent2: #e8c96e; --red: #e05c5c; --green: #5cb88a;
    --text: #e8e8f0; --text2: #8888aa; --text3: #55556a;
    --font: 'Noto Sans TC', sans-serif; --mono: 'DM Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* ── LOCK SCREEN ── */
  #lock-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 999; flex-direction: column; }
  .lock-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px 40px; width: 340px; text-align: center; animation: fadeUp .5s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .lock-icon { font-size: 48px; margin-bottom: 16px; display: block; }
  .lock-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .lock-sub { font-size: 13px; color: var(--text2); margin-bottom: 32px; }
  .pw-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px; font-size: 18px; color: var(--text); font-family: var(--mono); letter-spacing: .3em; text-align: center; outline: none; margin-bottom: 16px; }
  .pw-input:focus { border-color: var(--accent); }
  .pw-input.shake { animation: shake .3s ease; border-color: var(--red); }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-8px); } 40%,80% { transform: translateX(8px); } }
  .btn-unlock { width: 100%; background: var(--accent); color: #0f0f13; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }

  /* ── SIDEBAR ── */
  #app { display: none; }
  .sidebar { position: fixed; top: 0; left: 0; width: 220px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border); padding: 28px 20px; display: flex; flex-direction: column; gap: 6px; z-index: 100; overflow-y: auto; }
  .sidebar-brand { font-size: 11px; font-weight: 700; letter-spacing: .15em; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; padding: 0 4px; }
  .sidebar-trip { font-size: 14px; font-weight: 700; color: var(--text); padding: 0 4px; margin-bottom: 2px; }
  .sidebar-dates { font-size: 11px; color: var(--text2); padding: 0 4px; margin-bottom: 20px; }
  .sidebar-section { font-size: 10px; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; padding: 4px 4px 2px; margin-top: 8px; }
  .sidebar a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; font-size: 13px; color: var(--text2); text-decoration: none; transition: background .15s; }
  .sidebar a:hover { background: var(--surface2); color: var(--text); }
  .sidebar a.active { background: rgba(201,168,76,.12); color: var(--accent); font-weight: 600; }

  /* ── MAIN ── */
  .main { margin-left: 220px; padding: 32px 32px 80px; max-width: 900px; }
  .page-header { margin-bottom: 28px; }
  .page-title { font-size: 26px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 12px; }
  .page-title span { color: var(--accent); }
  .page-sub { font-size: 13px; color: var(--text2); margin-top: 6px; }

  /* ── SUMMARY CARDS ── */
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; }
  .card-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; }
  .card-value { font-size: 22px; font-weight: 700; font-family: var(--mono); color: var(--text); }
  .card-value.expense { color: var(--red); }

  /* ── ADD FORM ── */
  .add-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px 24px; margin-bottom: 24px; }
  .section-title { font-size: 13px; font-weight: 700; letter-spacing: .08em; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; }
  input, select { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 14px; color: var(--text); outline: none; }
  input:focus, select:focus { border-color: var(--accent); }
  .btn-add { background: var(--accent); color: #0f0f13; border: none; border-radius: 10px; padding: 11px 24px; font-size: 14px; font-weight: 700; cursor: pointer; }

  /* ── TABLE ── */
  .table-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .table-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px 14px; border-bottom: 1px solid var(--border); }
  .btn-refresh { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; font-size: 12px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .btn-refresh.spinning .refresh-icon { animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { padding: 10px 14px; text-align: left; font-size: 10px; color: var(--text3); background: var(--surface2); text-transform: uppercase; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 12px 14px; color: var(--text); }
  .td-amount { font-family: var(--mono); font-weight: 500; color: var(--red); }
  .td-date { font-family: var(--mono); font-size: 12px; color: var(--text2); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-lender { background: rgba(92,184,138,.15); color: var(--green); }
  .badge-payer { background: rgba(224,92,92,.15); color: var(--red); }
  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface); border: 1px solid var(--accent); border-radius: 12px; padding: 14px 20px; font-size: 14px; color: var(--text); opacity: 0; transition: .3s; pointer-events: none; z-index: 9999; }
  .toast.show { opacity: 1; }

  .loading-dots span { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin: 0 2px; animation: dot 1.2s infinite; }
  @keyframes dot { 0%,80%,100% { transform: scale(.6); opacity: .4; } 40% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box">
    <span class="lock-icon">🔐</span>
    <div class="lock-title">私人帳本</div>
    <div class="lock-sub">請輸入密碼以繼續</div>
    <input type="password" class="pw-input" id="pw-input" placeholder="••••••••" maxlength="20">
    <button class="btn-unlock" onclick="unlock()">解鎖</button>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<div id="app">
  <nav class="sidebar">
    <div class="sidebar-brand">TRIP GUIDE</div>
    <div class="sidebar-trip">YBO 韓國之旅</div>
    <div class="sidebar-dates">5/27 – 6/1 ｜ 首爾 6 天</div>
    <div class="sidebar-section">主要功能</div>
    <a href="https://mantou0613.github.io/korea-trip/index.html">🗓️ 行程秘笈</a>
    <a href="https://mantou0613.github.io/korea-trip/checklist.html">✈️ 行前準備</a>
    <a href="https://mantou0613.github.io/korea-trip/shopping-list.html">🛒 採買清單</a>
    <div class="sidebar-section">其他功能</div>
    <a href="https://mantou0613.github.io/korea-trip/money.html">💰 代購利潤計算</a>
    <a href="https://mantou0613.github.io/korea-trip/split.html">🧾 旅費分帳</a>
    <a href="https://mantou0613.github.io/korea-trip/food.html">🍜 美食清單</a>
    <a href="https://mantou0613.github.io/korea-trip/transport.html">🚇 交通地圖</a>
    <a href="#" class="active">💳 私人帳本</a>
  </nav>

  <main class="main">
    <div class="page-header">
      <div class="page-title">💳 <span>私人帳本</span></div>
      <div class="page-sub">你的個人收支記錄，資料同步至 Google Sheet</div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-label">總欠款</div>
        <div class="card-value expense" id="sum-expense">NT$ 0</div>
      </div>
      <div class="card">
        <div class="card-label">小惠欠款</div>
        <div class="card-value expense" id="sum-hui">NT$ 0</div>
      </div>
      <div class="card">
        <div class="card-label">胖蟲欠款</div>
        <div class="card-value expense" id="sum-fat">NT$ 0</div>
      </div>
    </div>

    <div class="add-section">
      <div class="section-title">＋ 新增記錄</div>
      <div class="form-grid">
        <div><label>日期</label><input type="date" id="f-date"></div>
        <div><label>項目</label><input type="text" id="f-item" placeholder="例：晚餐"></div>
        <div><label>總費用</label><input type="number" id="f-amount" placeholder="0"></div>
      </div>
      <div class="form-grid-2">
        <div>
          <label>借款方</label>
          <select id="f-lender">
            <option value="">— 選擇 —</option>
            <option value="小波">小波</option>
            <option value="小胖">小胖</option>
            <option value="胖蟲">胖蟲</option>
            <option value="小惠">小惠</option>
          </select>
        </div>
        <div>
          <label>代付方</label>
          <select id="f-payer">
            <option value="">— 選擇 —</option>
            <option value="小波">小波</option>
            <option value="小胖">小胖</option>
            <option value="胖蟲">胖蟲</option>
            <option value="小惠">小惠</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom:14px"><label>附註</label><input type="text" id="f-note" placeholder="選填..."></div>
      <button class="btn-add" onclick="addRecord()">＋ 加入記帳</button>
    </div>

    <div class="table-section">
      <div class="table-header">
        <div class="section-title" style="margin-bottom:0">記帳紀錄</div>
        <button class="btn-refresh" id="btn-refresh" onclick="loadSheet()"><span class="refresh-icon">↻</span> 同步 Sheet</button>
      </div>
      <div id="table-wrap"><div class="empty-state">讀取中...</div></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────
const PASSWORD    = '2oxiuuil';
const SHEET_ID    = '1VjfzTkD73H4AXVh7eYPG9jJ66hOxS8H6w6yqIedBu0c';
const SHEET_NAME  = 'Sheet1'; 
const GAS_URL     = 'https://script.google.com/macros/s/AKfycby2uoCy3chAq4YoL5LzekBvDh0ZBofbdMB9APAxVNMV7GwTu0FvlthgHw0VIv41H-qP0g/exec';

let sheetRecords = [];  
let localRecords = [];  

// ── LOCK ────────────────────────────────────────────
function unlock() {
  if (document.getElementById('pw-input').value === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('f-date').valueAsDate = new Date();
    loadSheet();
  } else {
    document.getElementById('pw-input').classList.add('shake');
    setTimeout(() => document.getElementById('pw-input').classList.remove('shake'), 500);
  }
}

// ── SHEET READ ───────────────────────────────────────
async function loadSheet() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`;
    const res  = await fetch(url);
    const text = await res.text();
    console.log('Raw CSV Check:', text.split('\n')[0]); // 偵錯用
    sheetRecords = parseCSV(text);
    renderTable();
    updateCards();
    showToast('✅ 同步成功');
  } catch(e) {
    showToast('⚠️ 同步失敗');
  }
  btn.classList.remove('spinning');
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length <= 1) return [];

  // 強大解析器：處理引號、逗號
  const processLine = (line) => {
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } 
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    return vals.map(v => v.replace(/^"|"$/g, ''));
  };

  // 1. 尋找真正的標題列 (有些 CSV 開頭會有空行或總計)
  let headerIndex = 0;
  for(let i=0; i<lines.length; i++){
    if(lines[i].includes('日期') && lines[i].includes('項目')){
      headerIndex = i;
      break;
    }
  }

  const header = processLine(lines[headerIndex]);
  
  // 2. 動態定位欄位索引
  const findIdx = (names) => header.findIndex(h => names.some(n => h.includes(n)));
  
  const idxDate   = findIdx(['日期']);
  const idxItem   = findIdx(['項目']);
  const idxAmt    = findIdx(['費用', '金額', '欠款']);
  const idxLender = findIdx(['借款方']);
  const idxPayer  = findIdx(['代付方']);
  const idxNote   = findIdx(['附註']);

  // 3. 讀取資料列
  return lines.slice(headerIndex + 1).map(line => {
    const v = processLine(line);
    return {
      '日期': v[idxDate] || '',
      '項目': v[idxItem] || '',
      '金額': v[idxAmt] || '0',
      '借款方': v[idxLender] || '',
      '代付方': v[idxPayer] || '',
      '附註': v[idxNote] || ''
    };
  }).filter(r => r['日期'] && r['日期'] !== '日期'); // 過濾標題重複或空行
}

function addRecord() {
  const date   = document.getElementById('f-date').value;
  const item   = document.getElementById('f-item').value.trim();
  const amount = document.getElementById('f-amount').value;
  const lender = document.getElementById('f-lender').value;
  const payer  = document.getElementById('f-payer').value;
  const note   = document.getElementById('f-note').value;

  if (!date || !item || !amount) { showToast('⚠️ 請填寫完整'); return; }

  const rec = { '日期': date, '項目': item, '金額': amount, '借款方': lender, '代付方': payer, '附註': note, _local: true };
  localRecords.unshift(rec);
  renderTable();
  updateCards();

  ['f-item','f-amount','f-lender','f-payer','f-note'].forEach(id => document.getElementById(id).value = '');

  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ '日期': date, '項目': item, '總費用': amount, '借款方': lender, '代付方': payer, '附註': note })
  }).then(() => {
    setTimeout(() => { localRecords = localRecords.filter(r => r !== rec); loadSheet(); }, 2000);
  });
}

// ── RENDER ───────────────────────────────────────────
function renderTable() {
  const all  = [...localRecords, ...sheetRecords];
  const wrap = document.getElementById('table-wrap');
  if (all.length === 0) { wrap.innerHTML = '<div class="empty-state">尚無資料</div>'; return; }

  const rows = all.map(r => {
    // 清除數字以外的符號 (如 $ 或 ,) 確保計算正確
    const cleanAmt = String(r['金額'] || '0').replace(/[^0-9.]/g, '');
    const amt = parseFloat(cleanAmt) || 0;
    
    return `<tr>
      <td class="td-date">${r['日期']}</td>
      <td>${r['項目']}${r._local ? ' ⏳' : ''}</td>
      <td class="td-amount">NT$ ${amt.toLocaleString()}</td>
      <td><span class="badge badge-lender">${r['借款方'] || '—'}</span></td>
      <td><span class="badge badge-payer">${r['代付方'] || '—'}</span></td>
      <td class="td-note">${r['附註'] || '—'}</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table><thead><tr><th>日期</th><th>項目</th><th>金額</th><th>借款</th><th>代付</th><th>附註</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function updateCards() {
  const all = [...localRecords, ...sheetRecords];
  let total = 0, hui = 0, fat = 0;
  
  all.forEach(r => {
    // 1. 取得原始字串
    const rawStr = String(r['金額'] || '0');
    
    // 2. 判斷是否為負數：如果字串包含 '-' 號
    const isNegative = rawStr.includes('-');
    
    // 3. 清除非數字字元 (只保留數字和小數點)
    const cleanAmt = rawStr.replace(/[^0-9.]/g, '');
    let amt = parseFloat(cleanAmt) || 0;
    
    // 4. 如果是負數，將數值轉為負值
    if (isNegative) amt = -amt;
    
    // 5. 加總計算
    total += amt;
    const lender = r['借款方'] || '';
    if (lender.includes('惠')) hui += amt;
    if (lender.includes('胖')) fat += amt;
  });
  
  // 更新介面，加上千分位，若為負數也會正常顯示
  document.getElementById('sum-expense').textContent = `NT$ ${total.toLocaleString()}`;
  document.getElementById('sum-hui').textContent = `NT$ ${hui.toLocaleString()}`;
  document.getElementById('sum-fat').textContent = `NT$ ${fat.toLocaleString()}`;
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
