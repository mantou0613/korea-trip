<script>
const firebaseConfig = {
    apiKey: "AIzaSyCSMV8JAc-VmnhncS15KK737rAL6kK-QDw",
    authDomain: "test-korea-e4f86.firebaseapp.com",
    databaseURL: "https://test-korea-e4f86-default-rtdb.firebaseio.com",
    projectId: "test-korea-e4f86",
    storageBucket: "test-korea-e4f86.firebasestorage.app",
    messagingSenderId: "423552522367",
    appId: "1:423552522367:web:03e57d440af0b5a118474a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 全域匯率（日幣 -> 台幣），先用固定預設值，之後可手動調整
let JPY_RATE = 0.22;

function onRateChange() {
    const v = parseFloat(document.getElementById('jpy-rate').value);
    JPY_RATE = isNaN(v) ? 0.22 : v;
    document.querySelectorAll('.item-row').forEach(row => updateTwdHint(row));
}

// 關閉所有移動選單
function closeAllDropdowns() {
    document.querySelectorAll('.move-dropdown').forEach(d => d.remove());
}
document.addEventListener('click', closeAllDropdowns);

// 圖片壓縮
function compressImage(file, callback) {
    const reader = new FileReader();
    reader.onload = e => {
        const img = new Image();
        img.onload = () => {
            const MAX = 600;
            let w = img.width, h = img.height;
            if (w > h && w > MAX) { h = h * MAX / w; w = MAX; }
            else if (h > MAX) { w = w * MAX / h; h = MAX; }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            callback(canvas.toDataURL('image/jpeg', 0.75));
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function appendPhoto(photosDiv, base64) {
    const thumb = document.createElement('div');
    thumb.className = 'photo-thumb';
    thumb.innerHTML = `
        <img src="${base64}" onclick="openLightbox('${base64}')" alt="商品圖">
        <button class="del-photo" onclick="this.parentElement.remove()" title="刪除圖片">×</button>
    `;
    const addBtn = photosDiv.querySelector('.add-photo-btn');
    photosDiv.insertBefore(thumb, addBtn);
}

// 顯示移動選單
function showMoveDropdown(btn, itemRow) {
    event.stopPropagation();
    closeAllDropdowns();

    const currentCard = itemRow.closest('.location-card');
    const allCards = Array.from(document.querySelectorAll('.location-card'));

    if (allCards.length <= 1) {
        const tip = document.createElement('div');
        tip.className = 'move-dropdown';
        tip.style.cssText = 'position:absolute;top:34px;right:0;';
        tip.innerHTML = `<div class="move-dropdown-header">目前只有一個分區</div><div style="padding:10px 14px 12px;font-size:12px;color:#aaa;">請先新增其他分區</div>`;
        btn.appendChild(tip);
        return;
    }

    const dropdown = document.createElement('div');
    dropdown.className = 'move-dropdown';
    dropdown.innerHTML = `<div class="move-dropdown-header">移動到 →</div>`;

    allCards.forEach((card, i) => {
        const name = card.querySelector('.loc-name').value || `分區 ${i + 1}`;
        const isCurrent = card === currentCard;
        const item = document.createElement('div');
        item.className = 'move-dropdown-item' + (isCurrent ? ' current-loc' : '');
        item.innerHTML = `<span class="loc-dot" style="${isCurrent ? 'background:#ddd;' : ''}"></span>${name}${isCurrent ? ' <span style="font-size:10px;color:#ccc;font-weight:400;">(目前)</span>' : ''}`;
        if (!isCurrent) {
            item.onclick = (e) => {
                e.stopPropagation();
                const targetList = card.querySelector('.item-list');
                targetList.appendChild(itemRow);
                itemRow.classList.add('just-moved');
                setTimeout(() => itemRow.classList.remove('just-moved'), 1000);
                closeAllDropdowns();
                const offset = 60;
                const top = card.getBoundingClientRect().top + window.scrollY - offset;
                window.scrollTo({ top, behavior: 'smooth' });
            };
        }
        dropdown.appendChild(item);
    });

    btn.style.position = 'relative';
    btn.appendChild(dropdown);
}

// ===== 金額：日幣 -> 台幣換算顯示 =====
function updateTwdHint(itemRow) {
    const priceInput = itemRow.querySelector('.item-price');
    const hint = itemRow.querySelector('.price-twd-hint');
    if (!priceInput || !hint) return;
    const jpy = parseFloat(priceInput.value);
    if (isNaN(jpy) || jpy === 0) {
        hint.innerHTML = `約 <b>NT$0</b>`;
        return;
    }
    const twd = Math.round(jpy * JPY_RATE);
    hint.innerHTML = `約 <b>NT$${twd.toLocaleString()}</b>`;
}

// ===== 數量／購買紀錄 =====
function calcQtyTotal(logs) {
    return (logs || []).reduce((sum, l) => sum + (parseInt(l.qty) || 0), 0);
}

function updateQtyTotalDisplay(itemRow) {
    const logs = getQtyLogs(itemRow);
    const total = calcQtyTotal(logs);
    const totalEl = itemRow.querySelector('.qty-total-num');
    if (totalEl) totalEl.textContent = total;
}

function getQtyLogs(itemRow) {
    const logs = [];
    itemRow.querySelectorAll('.qty-log-entry').forEach(entry => {
        const date = entry.querySelector('input[type="date"]').value;
        const qty = entry.querySelector('input[type="number"]').value;
        if (date || qty) logs.push({ date, qty });
    });
    return logs;
}

function renderQtyLogEntry(itemRow, log) {
    const list = itemRow.querySelector('.qty-log-list');
    const emptyTip = list.querySelector('.qty-log-empty');
    if (emptyTip) emptyTip.remove();

    const entry = document.createElement('div');
    entry.className = 'qty-log-entry';
    entry.innerHTML = `
        <input type="date" value="${log.date || ''}">
        <input type="number" value="${log.qty || ''}" min="0" placeholder="0">
        <span class="qty-log-unit">個</span>
        <button class="qty-log-del" title="刪除這筆紀錄">×</button>
    `;
    entry.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('input', () => updateQtyTotalDisplay(itemRow));
    });
    entry.querySelector('.qty-log-del').onclick = () => {
        entry.remove();
        if (!list.querySelector('.qty-log-entry')) {
            list.innerHTML = `<div class="qty-log-empty">尚無購買紀錄</div>` + list.innerHTML;
        }
        updateQtyTotalDisplay(itemRow);
    };
    list.appendChild(entry);
}

function addQtyLog(itemRow, log) {
    renderQtyLogEntry(itemRow, log || { date: new Date().toISOString().slice(0,10), qty: '' });
    updateQtyTotalDisplay(itemRow);
}

function toggleQtyLog(itemRow) {
    itemRow.classList.toggle('log-open');
}

// 渲染商品列
function renderItem(item) {
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
        <div class="item-header">
            <input type="text" class="item-name-input" value="${item.name||''}" placeholder="商品名稱">
            <div class="item-actions">
                <div class="move-btn" title="移動到其他分區">✈︎</div>
                <button class="del-btn" title="刪除商品" style="width:22px;height:22px;font-size:12px;">×</button>
            </div>
        </div>
        <div class="item-fields">
            <div class="sub-field"><label>備注事項</label><input type="text" class="item-pos" value="${item.pos||''}"></div>
            <div class="price-field-box">
                <label style="font-size:10px;color:#999;font-weight:700;letter-spacing:0.5px;">金額（日幣）</label>
                <div class="price-input-row">
                    <span class="price-currency-tag">¥</span>
                    <input type="number" class="item-price" value="${item.price||''}" placeholder="0">
                </div>
                <div class="price-twd-hint">約 <b>NT$0</b></div>
            </div>
        </div>
        <div class="qty-field-box" style="margin-bottom:12px;">
            <label style="font-size:10px;color:#999;font-weight:700;letter-spacing:0.5px;">購買數量（累計）</label>
            <div class="qty-summary-row">
                <div class="qty-total-display"><span class="qty-total-num">0</span><span class="unit">個</span></div>
                <div class="qty-toggle-hint">購買紀錄 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></div>
            </div>
            <div class="qty-log-panel">
                <div class="qty-log-list">
                    <div class="qty-log-empty">尚無購買紀錄</div>
                </div>
                <button class="qty-log-add-btn" type="button">＋ 新增一筆購買紀錄</button>
            </div>
        </div>
        <span class="photo-label">商品圖片</span>
        <div class="item-photos">
            <div class="add-photo-btn" title="新增圖片">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                新增
            </div>
            <input type="file" class="hidden-file" accept="image/*" multiple>
        </div>
    `;

    const fileInput = div.querySelector('.hidden-file');
    const photosDiv = div.querySelector('.item-photos');
    div.querySelector('.add-photo-btn').onclick = () => fileInput.click();

    fileInput.addEventListener('change', () => {
        Array.from(fileInput.files).forEach(file => {
            compressImage(file, base64 => appendPhoto(photosDiv, base64));
        });
        fileInput.value = '';
    });

    if (item.photos && item.photos.length) {
        item.photos.forEach(b64 => appendPhoto(photosDiv, b64));
    }

    // 金額換算
    const priceInput = div.querySelector('.item-price');
    priceInput.addEventListener('input', () => updateTwdHint(div));
    updateTwdHint(div);

    // 購買紀錄（向下相容舊資料的 qty 欄位：若有舊的單一數量，轉成第一筆紀錄）
    const qtyLogs = item.qtyLogs && item.qtyLogs.length ? item.qtyLogs
        : (item.qty ? [{ date:'', qty:item.qty }] : []);
    qtyLogs.forEach(log => addQtyLog(div, log));
    updateQtyTotalDisplay(div);

    div.querySelector('.qty-summary-row').addEventListener('click', () => toggleQtyLog(div));
    div.querySelector('.qty-log-add-btn').addEventListener('click', () => addQtyLog(div));

    // 移動按鈕
    const moveBtn = div.querySelector('.move-btn');
    moveBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        showMoveDropdown(moveBtn, div);
    });

    // 刪除按鈕
    div.querySelector('.del-btn').onclick = () => div.remove();

    return div;
}

// 渲染地點區塊（品牌大標題封面式設計）
function renderLocation(loc) {
    const container = document.getElementById('list-container');
    const card = document.createElement('div');
    card.className = 'location-card';
    card.innerHTML = `
        <div class="location-banner">
            <div class="location-index">${(document.querySelectorAll('.location-card').length + 1).toString().padStart(2,'0')}</div>
            <div class="location-title-wrap">
                <div class="location-banner-label">SHOP / BRAND</div>
                <div class="location-title"><input type="text" class="loc-name" value="${loc.name||''}" placeholder="輸入品牌／店名 (如: Olive Young)"></div>
            </div>
            <button class="del-btn" onclick="removeLocation(this)" title="刪除整個分區">×</button>
        </div>
        <div class="location-body">
            <div class="item-list"></div>
            <button class="btn-add-item" onclick="addItem(this)">＋ 新增商品</button>
        </div>
    `;
    const itemList = card.querySelector('.item-list');
    (loc.items || [{ name:'', pos:'', price:'', qtyLogs:[], photos:[] }]).forEach(item => {
        itemList.appendChild(renderItem(item));
    });
    container.appendChild(card);
    updateJumpBar();
    card.querySelector('.loc-name').addEventListener('input', updateJumpBar);
}

function saveData() {
    const data = [];
    document.querySelectorAll('.location-card').forEach(card => {
        const locName = card.querySelector('.loc-name').value;
        const items = [];
        card.querySelectorAll('.item-row').forEach(row => {
            const name = row.querySelector('.item-name-input').value;
            const photos = [];
            row.querySelectorAll('.photo-thumb img').forEach(img => photos.push(img.src));
            const qtyLogs = getQtyLogs(row);
            if (name || photos.length || qtyLogs.length) {
                items.push({
                    name,
                    pos:   row.querySelector('.item-pos').value,
                    price: row.querySelector('.item-price').value,
                    qtyLogs,
                    photos
                });
            }
        });
        if (locName || items.length) data.push({ name: locName, items });
    });
    db.ref('ybo_shopping_list').set({ rate: JPY_RATE, locations: data }).then(() => alert("✅ 儲存成功！"));
}

function updateJumpBar() {
    const bar = document.getElementById('jump-bar');
    bar.innerHTML = '';
    document.querySelectorAll('.location-card').forEach((card, i) => {
        const name = card.querySelector('.loc-name').value || `分區 ${i + 1}`;
        const chip = document.createElement('button');
        chip.className = 'jump-chip';
        chip.textContent = name;
        chip.onclick = () => {
            const offset = 60;
            const top = card.getBoundingClientRect().top + window.scrollY - offset;
            window.scrollTo({ top, behavior: 'smooth' });
        };
        bar.appendChild(chip);
    });
}

function loadData() {
    db.ref('ybo_shopping_list').once('value', snap => {
        const raw = snap.val();
        const container = document.getElementById('list-container');
        container.innerHTML = '';

        // 向下相容：舊資料是純陣列，新資料是 { rate, locations }
        let data, rate;
        if (Array.isArray(raw)) {
            data = raw; rate = 0.22;
        } else if (raw && raw.locations) {
            data = raw.locations; rate = raw.rate || 0.22;
        } else {
            data = null; rate = 0.22;
        }

        JPY_RATE = rate;
        document.getElementById('jpy-rate').value = rate;

        if (data && data.length) data.forEach(loc => renderLocation(loc));
        else addLocation();
        updateJumpBar();
    });
}

function addLocation() {
    renderLocation({ name:'', items:[{ name:'', pos:'', price:'', qtyLogs:[], photos:[] }] });
    window.scrollTo({ top: document.body.scrollHeight, behavior:'smooth' });
}

function addItem(btn) {
    const itemList = btn.parentElement.querySelector('.item-list');
    itemList.appendChild(renderItem({ name:'', pos:'', price:'', qtyLogs:[], photos:[] }));
}

function removeLocation(btn) {
    if (confirm('確定要刪除整個分區嗎？')) {
        btn.closest('.location-card').remove();
        // 重新編號
        document.querySelectorAll('.location-index').forEach((el, i) => {
            el.textContent = (i + 1).toString().padStart(2, '0');
        });
        updateJumpBar();
    }
}

function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(e) {
    if (!e || e.target.id === 'lightbox' || e.target.id === 'lightbox-close') {
        document.getElementById('lightbox').classList.remove('open');
    }
}

loadData();

function toggleDrawer() { document.body.classList.toggle('drawer-open'); }
function closeDrawer() { document.body.classList.remove('drawer-open'); }
document.getElementById('drawer').addEventListener('touchend', e => {
    if (e.changedTouches[0].clientX < 50) closeDrawer();
}, { passive: true });
</script>
</body>
