<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓國交通表</title>
    <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #F0EEE9; padding-bottom: 40px; }

/* 抽屜 */
.drawer-overlay { position:fixed;inset:0;z-index:200;background:rgba(26,26,24,0.5);opacity:0;pointer-events:none;transition:opacity .28s; }
body.drawer-open .drawer-overlay { opacity:1;pointer-events:auto; }
.drawer { position:fixed;top:0;left:0;bottom:0;z-index:210;width:272px;background:#1A1A18;transform:translateX(-100%);transition:transform .3s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column; }
body.drawer-open .drawer { transform:translateX(0); }
.drawer-header { padding:52px 22px 20px;border-bottom:1px solid rgba(255,214,10,0.12); }
.drawer-trip-label { font-size:10px;color:#FFD60A;font-weight:700;letter-spacing:2px;opacity:.75; }
.drawer-trip-name { font-size:19px;font-weight:900;color:#fff;margin-top:4px; }
.drawer-trip-date { font-size:12px;color:#555;margin-top:4px; }
.drawer-nav { flex:1;overflow-y:auto;padding:14px 10px; }
.nav-section-label { font-size:9px;color:#444;font-weight:700;letter-spacing:2px;padding:12px 10px 5px; }
.nav-item { display:flex;align-items:center;gap:13px;padding:12px 13px;border-radius:13px;text-decoration:none;color:#888;font-size:14px;font-weight:700;margin-bottom:2px; }
.nav-item.active { background:rgba(255,214,10,0.1);color:#FFD60A; }
.nav-icon { width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;background:rgba(255,255,255,0.05); }

/* Topbar */
.topbar { position:sticky;top:0;z-index:150;background:rgba(240,238,233,0.95);backdrop-filter:blur(12px);padding:10px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(0,0,0,0.05); }
.menu-btn { width:38px;height:38px;background:#1A1A18;border:none;border-radius:11px;cursor:pointer;font-size:18px;color:#FFD60A;flex-shrink:0; }
.topbar-title { font-size:16px;font-weight:900;color:#1A1A18; }

/* 跳轉列 */
.jump-bar { position:sticky;top:58px;z-index:140;background:rgba(240,238,233,0.95);backdrop-filter:blur(10px);display:flex;gap:8px;padding:10px 14px;border-bottom:1px solid #E8E6E0;overflow-x:auto; }
.jump-bar::-webkit-scrollbar { display:none; }
.jump-chip { flex:0 0 auto;padding:8px 16px;border-radius:12px;border:1px solid #D8D6D0;background:#fff;font-size:12px;font-weight:700;color:#1A1A18;cursor:pointer;white-space:nowrap; }
.jump-chip:active { background:#FFD60A; }

/* 內容 */
#section-subway, #section-station { padding: 20px 16px; }
h3 { font-size: 15px; font-weight: 900; margin-bottom: 12px; color: #1A1A18; }
img { max-width:100%;height:auto;border-radius:12px;border:1px solid #E4E2DC;box-shadow:0 2px 12px rgba(0,0,0,0.06); }
    </style>
</head>
<body>
    <div class="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-trip-label">TRIP GUIDE</div>
    <div class="drawer-trip-name">YBO 韓國之旅</div>
    <div class="drawer-trip-date">5/27 – 6/1 ｜ 首爾 6 天</div>
  </div>
  <nav class="drawer-nav">
    <div class="nav-section-label">主要功能</div>
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🗓️</div><span>行程秘笈</span>
    </a>
    <a href="checklist.html" class="nav-item">
      <div class="nav-icon">✈️</div><span>行前準備</span>
    </a>
    <a href="shopping-list.html" class="nav-item">
      <div class="nav-icon">🛒</div><span>採買清單</span>
    </a>
    <div class="nav-section-label">即將推出</div>
    <a href="money.html" class="nav-item"><div class="nav-icon">💰</div><span>代購利潤計算</span></a>
    <a href="food.html" class="nav-item"><div class="nav-icon">🍜</div><span>美食清單</span></a>
    <a href="transport.html" class="nav-item"><div class="nav-icon">🚇</div><span>交通地圖</span></a>
  </nav>
</div>
<div class="topbar">
  <button onclick="toggleDrawer()" class="menu-btn">☰</button>
  <span class="topbar-title">🚇 交通地圖</span>
</div>

<div class="jump-bar">
  <button class="jump-chip" onclick="scrollToSection('section-subway')">🚇 地鐵</button>
  <button class="jump-chip" onclick="scrollToSection('section-station')">🗺️ 捷運站點</button>
</div>
    
<div id="section-subway">
  <h3>首爾地鐵路線圖</h3>
  <img src="https://meee.com.tw/9pzggaV" alt="韓國地鐵圖">
</div>
<div id="section-station">
  <h3>常用捷運站點</h3>
  <img src="https://meee.com.tw/7g8vYJC" alt="捷運站點圖">
</div>
<script>
function toggleDrawer() { document.body.classList.toggle('drawer-open'); }
function closeDrawer() { document.body.classList.remove('drawer-open'); }
document.getElementById('drawer').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientX < 50) closeDrawer();
}, { passive: true });

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const offset = 110;
  const top = el.getBoundingClientRect().top + window.scrollY - offset;
  window.scrollTo({ top, behavior: 'smooth' });
}
</script>
</body>
</html>
