<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美食清單</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    :root { --primary:#FFD60A; --dark:#1A1A18; --bg:#F0EEE9; --accent:#E6430A; --naver:#03C75A; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); padding-bottom:120px; color:var(--dark); }

    /* ── 抽屜 ── */
    .drawer-overlay { position:fixed;inset:0;z-index:200;background:rgba(26,26,24,0.5);opacity:0;pointer-events:none;transition:opacity .28s; }
    body.drawer-open .drawer-overlay { opacity:1;pointer-events:auto; }
    .drawer { position:fixed;top:0;left:0;bottom:0;z-index:210;width:272px;background:#1A1A18;transform:translateX(-100%);transition:transform .3s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column; }
    body.drawer-open .drawer { transform:translateX(0); }
    .drawer-header { padding:52px 22px 20px;border-bottom:1px solid rgba(255,214,10,0.12); }
    .drawer-trip-label { font-size:10px;color:#FFD60A;font-weight:700;letter-spacing:2px;opacity:.75; }
    .drawer-trip-name { font-size:19px;font-weight:900;color:#fff;margin-top:4px; }
    .drawer-trip-date { font-size:12px;color:#555;margin-top:4px; }
    .drawer-nav { flex:1;overflow-y:auto;padding:14px 10px; }
    .nav-section-label { font-size:9px;color:#444;font-weight:700;letter-spacing:2px;padding:12px 10px 5px; }
    .nav-item { display:flex;align-items:center;gap:13px;padding:12px 13px;border-radius:13px;text-decoration:none;color:#888;font-size:14px;font-weight:700;margin-bottom:2px; }
    .nav-item.active { background:rgba(255,214,10,0.1);color:#FFD60A; }
    .nav-icon { width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;background:rgba(255,255,255,0.05); }

    /* ── Topbar ── */
    .topbar { position:sticky;top:0;z-index:150;background:rgba(240,238,233,0.95);backdrop-filter:blur(12px);padding:10px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(0,0,0,0.05); }
    .menu-btn { width:38px;height:38px;background:#1A1A18;border:none;border-radius:11px;cursor:pointer;font-size:18px;color:#FFD60A;flex-shrink:0; }
    .topbar-title { font-size:16px;font-weight:900;flex:1; }

    /* ── 跳轉列 ── */
    .jump-bar { position:sticky;top:58px;z-index:140;background:rgba(240,238,233,0.95);backdrop-filter:blur(10px);display:flex;gap:8px;padding:10px 14px;border-bottom:1px solid #E8E6E0;overflow-x:auto;-webkit-overflow-scrolling:touch; }
    .jump-bar::-webkit-scrollbar { display:none; }
    .jump-chip { flex:0 0 auto;padding:8px 16px;border-radius:12px;border:1px solid #D8D6D0;background:#fff;font-size:12px;font-weight:700;color:var(--dark);cursor:pointer;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.05);transition:all .15s; }
    .jump-chip:active { background:var(--primary);transform:scale(0.95); }

    /* ── 地區區塊 ── */
    .wrap { padding:16px 12px; }
    .area-card { background:#fff;border-radius:24px;padding:20px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.03); }
    .area-header { display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1.5px solid #F2F0EA; }
    .area-name-input { border:none;font-size:17px;font-weight:900;font-family:inherit;outline:none;flex:1;background:transparent;color:var(--accent); }
    .area-name-input::placeholder { color:#ccc; }
    .del-btn { color:#D1D1D1;cursor:pointer;border:none;background:#f5f5f5;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s;flex-shrink:0; }
    .del-btn:hover { background:#ffeded;color:var(--accent); }

    /* ── 餐廳卡片 ── */
    .restaurant-row { background:#FAFAF8;border-radius:16px;padding:14px;margin-bottom:12px;transition:all 0.2s; }
    .restaurant-row:focus-within { background:#fff;box-shadow:0 0 0 2px var(--primary); }
    .rest-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:10px; }
    .rest-name-input { font-weight:700;font-size:15px;border:none;flex:1;outline:none;background:transparent;color:var(--dark);font-family:inherit; }
    .rest-name-input::placeholder { color:#ccc; }

    .rest-fields { display:flex;flex-direction:column;gap:8px;margin-bottom:10px; }
    .rest-field { display:flex;flex-direction:column;gap:4px; }
    .rest-field label { font-size:10px;color:#999;font-weight:700;letter-spacing:0.5px; }
    .rest-field input, .rest-field textarea { border:1px solid #E8E6E0;background:#fff;border-radius:8px;padding:8px;font-size:13px;font-family:inherit;width:100%;font-weight:500;outline:none;color:var(--dark); }
    .rest-field input:focus, .rest-field textarea:focus { border-color:var(--dark); }
    .rest-field textarea { resize:none;height:56px;line-height:1.6; }

    /* ── 導航按鈕群組 ── */
    .nav-btns { display:flex;gap:8px;margin-top:4px; }

    .nav-map-btn {
      display:flex;align-items:center;justify-content:center;gap:5px;
      flex:1;padding:10px 6px;
      border:none;border-radius:10px;
      color:#fff;font-size:12px;font-weight:700;
      cursor:pointer;font-family:inherit;text-decoration:none;
      transition:opacity .15s, transform .15s;
    }
    .nav-map-btn:active { opacity:.8; transform:scale(0.97); }

    /* Naver 綠 */
    .btn-naver { background:var(--naver); }
    /* Google 藍（備用） */
    .btn-google { background:#4285F4; }

    .btn-add-rest { margin-top:8px;background:#F2F0EA;border:none;padding:12px;width:100%;border-radius:12px;color:#666;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:background 0.2s; }
    .btn-add-rest:hover { background:#E8E6E0; }

    /* ── 底部 ── */
    .footer-tools { position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.92);backdrop-filter:blur(15px);padding:14px 16px 30px;border-top:1px solid rgba(0,0,0,0.05);display:flex;gap:12px;z-index:100; }
    .footer-tools button { flex:1;border:none;padding:14px;border-radius:14px;font-weight:900;cursor:pointer;font-family:inherit;font-size:13px;transition:transform 0.1s; }
    .footer-tools button:active { transform:scale(0.96); }
    .btn-new-area { background:var(--dark);color:var(--primary); }
    .btn-save { background:#4CAF50;color:#fff; }
  </style>
</head>
<body>

<!-- 抽屜 -->
<div class="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-trip-label">TRIP GUIDE</div>
    <div class="drawer-trip-name">YBO 韓國之旅</div>
    <div class="drawer-trip-date">5/27 – 6/1 ｜ 首爾 6 天</div>
  </div>
  <nav class="drawer-nav">
    <div class="nav-section-label">主要功能</div>
    <a href="index.html" class="nav-item"><div class="nav-icon">🗓️</div><span>行程秘笈</span></a>
    <a href="checklist.html" class="nav-item"><div class="nav-icon">✈️</div><span>行前準備</span></a>
    <a href="shopping-list.html" class="nav-item"><div class="nav-icon">🛒</div><span>採買清單</span></a>
    <div class="nav-section-label">即將推出</div>
    <a href="money.html" class="nav-item"><div class="nav-icon">💰</div><span>代購利潤計算</span></a>
    <a href="food.html" class="nav-item active"><div class="nav-icon">🍜</div><span>美食清單</span></a>
    <a href="transport.html" class="nav-item"><div class="nav-icon">🚇</div><span>交通地圖</span></a>
  </nav>
</div>

<!-- Topbar -->
<div class="topbar">
  <button onclick="toggleDrawer()" class="menu-btn">☰</button>
  <span class="topbar-title">🍜 美食清單</span>
</div>

<!-- 跳轉列 -->
<div class="jump-bar" id="jump-bar"></div>

<!-- 內容 -->
<div class="wrap" id="list-container"></div>

<!-- 底部按鈕 -->
<div class="footer-tools">
  <button class="btn-new-area" onclick="addArea()">＋ 新增地區</button>
  <button class="btn-save" onclick="saveData()">💾 儲存清單</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSMV8JAc-VmnhncS15KK737rAL6kK-QDw",
  authDomain: "test-korea-e4f86.firebaseapp.com",
  databaseURL: "https://test-korea-e4f86-default-rtdb.firebaseio.com",
  projectId: "test-korea-e4f86",
  storageBucket: "test-korea-e4f86.firebasestorage.app",
  messagingSenderId: "423552522367",
  appId: "1:423552522367:web:03e57d440af0b5a118474a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── Naver Maps 深層連結 ──
// 優先嘗試開啟 App（nmap://），若未安裝則 fallback 到網頁版
function openNaverMaps(addr) {
  if (!addr || !addr.trim()) {
    alert('請先填寫地址！');
    return;
  }
  const encoded = encodeURIComponent(addr);

  // nmap:// scheme → 直接叫起 Naver Maps App（iOS & Android 通用）
  const appUrl  = `nmap://search?query=${encoded}&appname=com.ybo.korea`;
  // 網頁備用（若 App 未安裝）
  const webUrl  = `https://map.naver.com/v5/search/${encoded}`;

  // 嘗試打開 App；若 500ms 內沒反應（App 未裝）就開網頁
  const start = Date.now();
  window.location = appUrl;
  setTimeout(() => {
    // 若使用者還在頁面上（App 沒攔截跳轉），就開網頁版
    if (Date.now() - start < 1500) {
      window.open(webUrl, '_blank');
    }
  }, 500);
}

// ── 渲染餐廳列 ──
function renderRestaurant(rest) {
  const div = document.createElement('div');
  div.className = 'restaurant-row';
  div.innerHTML = `
    <div class="rest-header">
      <input type="text" class="rest-name-input" value="${escHtml(rest.name||'')}" placeholder="餐廳名稱">
      <button class="del-btn" onclick="this.closest('.restaurant-row').remove()">×</button>
    </div>
    <div class="rest-fields">
      <div class="rest-field"><label>📍 地址（韓文更準確）</label><input type="text" class="rest-addr" value="${escHtml(rest.addr||'')}" placeholder="例：서울 중구 명동길 14"></div>
      <div class="rest-field"><label>📞 電話</label><input type="tel" class="rest-phone" value="${escHtml(rest.phone||'')}" placeholder="例：+82-2-1234-5678"></div>
      <div class="rest-field"><label>🕐 營業時間</label><input type="text" class="rest-hours" value="${escHtml(rest.hours||'')}" placeholder="例：11:00 - 21:00"></div>
      <div class="rest-field"><label>🍽️ 推薦菜色</label><textarea class="rest-menu" placeholder="例：炸雞、部隊鍋...">${escHtml(rest.menu||'')}</textarea></div>
    </div>
    <div class="nav-btns">
      <button class="nav-map-btn btn-naver" onclick="openNaverMaps(this.closest('.restaurant-row').querySelector('.rest-addr').value)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13.64 2L10.36 2L4 22H7.5L9 17H15L16.5 22H20L13.64 2ZM9.83 14L12 6.8L14.17 14H9.83Z" fill="white"/></svg>
        Naver Maps 導航
      </button>
      <a class="nav-map-btn btn-google rest-gmap-btn" href="#" target="_blank">
        🗺 Google Maps
      </a>
    </div>
  `;

  // 地址變更時同步更新 Google Maps 連結
  const addrInput = div.querySelector('.rest-addr');
  const gmapBtn   = div.querySelector('.rest-gmap-btn');

  function updateGmap() {
    const v = addrInput.value.trim();
    gmapBtn.href = v
      ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(v)
      : '#';
  }
  updateGmap(); // 初始化
  addrInput.addEventListener('input', updateGmap);

  return div;
}

// ── HTML 轉義（防 XSS） ──
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 渲染地區區塊 ──
function renderArea(area) {
  const container = document.getElementById('list-container');
  const card = document.createElement('div');
  card.className = 'area-card';
  card.id = 'area-' + Date.now() + Math.random().toString(36).slice(2,6);

  card.innerHTML = `
    <div class="area-header">
      <input type="text" class="area-name-input" value="${escHtml(area.name||'')}" placeholder="輸入地區名稱（例：明洞）">
      <button class="del-btn" onclick="removeArea(this)">×</button>
    </div>
    <div class="rest-list"></div>
    <button class="btn-add-rest" onclick="addRestaurant(this)">＋ 新增餐廳</button>
  `;

  const restList = card.querySelector('.rest-list');
  (area.restaurants || [{ name:'', addr:'', phone:'', hours:'', menu:'' }]).forEach(r => {
    restList.appendChild(renderRestaurant(r));
  });

  container.appendChild(card);
  card.querySelector('.area-name-input').addEventListener('input', updateJumpBar);
  updateJumpBar();
}

// ── 跳轉列更新 ──
function updateJumpBar() {
  const bar = document.getElementById('jump-bar');
  bar.innerHTML = '';
  document.querySelectorAll('.area-card').forEach((card, i) => {
    const name = card.querySelector('.area-name-input').value || `地區 ${i + 1}`;
    const chip = document.createElement('button');
    chip.className = 'jump-chip';
    chip.textContent = name;
    chip.onclick = () => {
      const top = card.getBoundingClientRect().top + window.scrollY - 115;
      window.scrollTo({ top, behavior: 'smooth' });
    };
    bar.appendChild(chip);
  });
}

function addArea() {
  renderArea({ name:'', restaurants:[{ name:'', addr:'', phone:'', hours:'', menu:'' }] });
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function addRestaurant(btn) {
  const restList = btn.parentElement.querySelector('.rest-list');
  restList.appendChild(renderRestaurant({ name:'', addr:'', phone:'', hours:'', menu:'' }));
}

function removeArea(btn) {
  if (confirm('確定要刪除這個地區嗎？')) {
    btn.closest('.area-card').remove();
    updateJumpBar();
  }
}

function saveData() {
  const data = [];
  document.querySelectorAll('.area-card').forEach(card => {
    const name = card.querySelector('.area-name-input').value;
    const restaurants = [];
    card.querySelectorAll('.restaurant-row').forEach(row => {
      const rname = row.querySelector('.rest-name-input').value;
      if (rname.trim()) {
        restaurants.push({
          name:  rname,
          addr:  row.querySelector('.rest-addr').value,
          phone: row.querySelector('.rest-phone').value,
          hours: row.querySelector('.rest-hours').value,
          menu:  row.querySelector('.rest-menu').value,
        });
      }
    });
    if (name || restaurants.length) data.push({ name, restaurants });
  });
  db.ref('ybo_food_list').set(data).then(() => alert('✅ 儲存成功！'));
}

function loadData() {
  db.ref('ybo_food_list').once('value', snap => {
    const data = snap.val();
    document.getElementById('list-container').innerHTML = '';
    if (data && data.length) data.forEach(area => renderArea(area));
    else addArea();
    updateJumpBar();
  });
}

function toggleDrawer() { document.body.classList.toggle('drawer-open'); }
function closeDrawer()  { document.body.classList.remove('drawer-open'); }
document.getElementById('drawer').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientX < 50) closeDrawer();
}, { passive: true });

loadData();
</script>
</body>
</html>
