<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代購利潤計算</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    :root { --primary:#FFD60A; --dark:#1A1A18; --bg:#F0EEE9; --accent:#E6430A; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); padding-bottom:40px; color:var(--dark); }

    /* 抽屜 */
    .drawer-overlay { position:fixed;inset:0;z-index:200;background:rgba(26,26,24,0.5);opacity:0;pointer-events:none;transition:opacity .28s; }
    body.drawer-open .drawer-overlay { opacity:1;pointer-events:auto; }
    .drawer { position:fixed;top:0;left:0;bottom:0;z-index:210;width:272px;background:#1A1A18;transform:translateX(-100%);transition:transform .3s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column; }
    body.drawer-open .drawer { transform:translateX(0); }
    .drawer-header { padding:52px 22px 20px;border-bottom:1px solid rgba(255,214,10,0.12); }
    .drawer-trip-label { font-size:10px;color:#FFD60A;font-weight:700;letter-spacing:2px;opacity:.75; }
    .drawer-trip-name { font-size:19px;font-weight:900;color:#fff;margin-top:4px; }
    .drawer-trip-date { font-size:12px;color:#555;margin-top:4px; }
    .drawer-nav { flex:1;overflow-y:auto;padding:14px 10px; }
    .nav-section-label { font-size:9px;color:#444;font-weight:700;letter-spacing:2px;padding:12px 10px 5px; }
    .nav-item { display:flex;align-items:center;gap:13px;padding:12px 13px;border-radius:13px;text-decoration:none;color:#888;font-size:14px;font-weight:700;margin-bottom:2px; }
    .nav-item.active { background:rgba(255,214,10,0.1);color:#FFD60A; }
    .nav-icon { width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;background:rgba(255,255,255,0.05); }

    /* Topbar */
    .topbar { position:sticky;top:0;z-index:150;background:rgba(240,238,233,0.95);backdrop-filter:blur(12px);padding:10px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(0,0,0,0.05); }
    .menu-btn { width:38px;height:38px;background:#1A1A18;border:none;border-radius:11px;cursor:pointer;font-size:18px;color:#FFD60A;flex-shrink:0; }
    .topbar-title { font-size:16px;font-weight:900;flex:1; }

    /* 匯率列 */
    .rate-bar { background:#fff;border-bottom:1px solid #E8E6E0;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px; }
    .rate-bar span { color:#888; }
    .rate-val { font-weight:900;color:var(--accent);cursor:pointer;border-bottom:1px dashed var(--accent); }

    /* 內容 */
    .wrap { padding:16px 12px; }

    /* 新增按鈕 */
    .btn-add-item { width:100%;padding:14px;background:var(--dark);color:var(--primary);border:none;border-radius:16px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;margin-bottom:16px; }

    /* 商品卡片 */
    .item-card { background:#fff;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 3px 16px rgba(0,0,0,0.06);border:1px solid #ECEAE4; }
    .item-name-row { display:flex;align-items:center;gap:10px;margin-bottom:14px; }
    .item-name-input { flex:1;border:none;border-bottom:1.5px solid #E8E6E0;padding:6px 4px;font-size:15px;font-weight:700;font-family:inherit;outline:none;background:transparent;color:var(--dark); }
    .item-name-input:focus { border-bottom-color:var(--accent); }
    .del-card-btn { background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;line-height:1;flex-shrink:0; }
    .del-card-btn:hover { color:var(--accent); }

    .fields { display:flex;flex-direction:column;gap:10px; }
    .field { display:flex;flex-direction:column;gap:4px; }
    .field label { font-size:10px;color:#999;font-weight:700;letter-spacing:0.5px; }
    .field-row { display:flex;align-items:center;gap:8px; }
    .field input { border:1px solid #E8E6E0;border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;width:100%;outline:none;background:#FAFAF8;color:var(--dark);font-weight:500; }
    .field input:focus { border-color:var(--dark);background:#fff; }
    .field input.profit-input { font-weight:900;font-size:15px; }
    .field input.profit-pos { color:#1D9E75;border-color:#b2dfcf;background:#E1F5EE; }
    .field input.profit-neg { color:var(--accent);border-color:#f5c0b0;background:#FAECE7; }

    .twd-hint { font-size:11px;color:#aaa;font-weight:600;white-space:nowrap; }

    /* 利潤率 badge */
    .margin-badge { display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px; }
    .margin-pos { background:#E1F5EE;color:#1D9E75; }
    .margin-neg { background:#FAECE7;color:var(--accent); }

    /* 總計區 */
    .summary-card { background:var(--dark);border-radius:20px;padding:18px 20px;margin-bottom:16px;color:#fff; }
    .summary-title { font-size:11px;color:#FFD60A;font-weight:700;letter-spacing:2px;margin-bottom:12px; }
    .summary-row { display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.07); }
    .summary-row:last-child { border:none;padding-top:10px; }
    .summary-label { font-size:13px;color:#888; }
    .summary-value { font-size:14px;font-weight:700; }
    .summary-value.pos { color:#52FFD8; }
    .summary-value.neg { color:var(--accent); }
    .summary-value.total { font-size:18px;font-weight:900;color:var(--primary); }
  </style>
</head>
<body>

<!-- 抽屜 -->
<div class="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-trip-label">TRIP GUIDE</div>
    <div class="drawer-trip-name">YBO 韓國之旅</div>
    <div class="drawer-trip-date">5/27 – 6/1 ｜ 首爾 6 天</div>
  </div>
  <nav class="drawer-nav">
    <div class="nav-section-label">主要功能</div>
    <a href="index.html" class="nav-item"><div class="nav-icon">🗓️</div><span>行程秘笈</span></a>
    <a href="checklist.html" class="nav-item"><div class="nav-icon">✈️</div><span>行前準備</span></a>
    <a href="shopping-list.html" class="nav-item"><div class="nav-icon">🛒</div><span>採買清單</span></a>
    <div class="nav-section-label">其他功能</div>
    <a href="money.html" class="nav-item active"><div class="nav-icon">💰</div><span>代購利潤計算</span></a>
    <a href="food.html" class="nav-item"><div class="nav-icon">🍜</div><span>美食清單</span></a>
    <a href="transport.html" class="nav-item"><div class="nav-icon">🚇</div><span>交通地圖</span></a>
  </nav>
</div>

<!-- Topbar -->
<div class="topbar">
  <button onclick="toggleDrawer()" class="menu-btn">☰</button>
  <span class="topbar-title">💰 代購利潤計算</span>
</div>

<!-- 匯率列 -->
<div class="rate-bar">
  <span>目前匯率 1 ₩ ＝</span>
  <span class="rate-val" id="rate-display" onclick="editRate()">讀取中...</span>
  <span>TWD（點擊可修改）</span>
</div>

<div class="wrap">

  <!-- 總計 -->
  <div class="summary-card" id="summary-card">
    <div class="summary-title">📊 全部商品總計</div>
    <div class="summary-row">
      <span class="summary-label">總成本（台幣）</span>
      <span class="summary-value" id="total-cost">－</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">總售價（台幣）</span>
      <span class="summary-value" id="total-sell">－</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">總利潤</span>
      <span class="summary-value total" id="total-profit">－</span>
    </div>
  </div>

  <button class="btn-add-item" onclick="addItem()">＋ 新增商品</button>

  <div id="items-container"></div>
</div>

<script>
let rate = 0.025;

// ── 抓匯率 ──
async function fetchRate() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/KRW');
    const d = await r.json();
    if (d?.rates?.TWD) {
      rate = parseFloat((d.rates.TWD * 1.01).toFixed(5));
      document.getElementById('rate-display').textContent = rate;
      recalcAll();
    }
  } catch(e) {
    document.getElementById('rate-display').textContent = rate;
  }
}

function editRate() {
  const val = prompt('手動修改匯率（1 KRW = ? TWD）:', rate);
  if (val && !isNaN(val) && parseFloat(val) > 0) {
    rate = parseFloat(val);
    document.getElementById('rate-display').textContent = rate;
    recalcAll();
  }
}

// ── 新增商品卡片 ──
function addItem(data = {}) {
  const container = document.getElementById('items-container');
  const card = document.createElement('div');
  card.className = 'item-card';

  card.innerHTML = `
    <div class="item-name-row">
      <input type="text" class="item-name-input" placeholder="商品名稱（例：COSRX 蝸牛精華）" value="${data.name||''}">
      <button class="del-card-btn" onclick="this.closest('.item-card').remove(); recalcAll();">×</button>
    </div>
    <div class="fields">
      <div class="field">
        <label>韓幣進價 ₩</label>
        <div class="field-row">
          <input type="number" class="krw-input" placeholder="例：25000" value="${data.krw||''}">
          <span class="twd-hint" id="">＝ <span class="cost-twd">0</span> TWD</span>
        </div>
      </div>
      <div class="field">
        <label>台幣售價 TWD（可手動修改）</label>
        <input type="number" class="sell-input" placeholder="例：380" value="${data.sell||''}">
      </div>
      <div class="field">
        <label>利潤 TWD（可手動修改）</label>
        <input type="number" class="profit-input" placeholder="自動計算" value="${data.profit||''}">
        <span class="margin-badge" style="display:none;"></span>
      </div>
    </div>
  `;

  const krwInput   = card.querySelector('.krw-input');
  const sellInput  = card.querySelector('.sell-input');
  const profitInput = card.querySelector('.profit-input');
  const costTwd    = card.querySelector('.cost-twd');
  const badge      = card.querySelector('.margin-badge');

  // 韓幣進價變動 → 更新台幣成本 & 利潤
  krwInput.addEventListener('input', () => {
    const cost = calcCost(krwInput.value);
    costTwd.textContent = cost > 0 ? cost.toLocaleString() : '0';
    // 只有在利潤沒被手動改過時才自動算
    if (!profitInput.dataset.manual) {
      autoCalcProfit(cost, sellInput, profitInput, badge);
    }
    updateStyle(profitInput, badge);
    recalcAll();
  });

  // 售價變動 → 重算利潤（除非利潤被手動鎖住）
  sellInput.addEventListener('input', () => {
    const cost = calcCost(krwInput.value);
    if (!profitInput.dataset.manual) {
      autoCalcProfit(cost, sellInput, profitInput, badge);
    } else {
      updateStyle(profitInput, badge);
    }
    recalcAll();
  });

  // 利潤手動修改 → 標記為手動，不再自動覆蓋
  profitInput.addEventListener('input', () => {
    profitInput.dataset.manual = 'true';
    updateStyle(profitInput, badge);
    recalcAll();
  });

  // 雙擊利潤欄 → 解除手動鎖，恢復自動計算
  profitInput.addEventListener('dblclick', () => {
    delete profitInput.dataset.manual;
    const cost = calcCost(krwInput.value);
    autoCalcProfit(cost, sellInput, profitInput, badge);
    recalcAll();
  });

  container.appendChild(card);

  // 如果是載入既有資料，初始化顯示
  if (data.krw) {
    const cost = calcCost(data.krw);
    costTwd.textContent = cost > 0 ? cost.toLocaleString() : '0';
    if (data.profit !== undefined) {
      profitInput.dataset.manual = 'true';
    }
    updateStyle(profitInput, badge);
  }

  recalcAll();
}

function calcCost(krw) {
  const v = parseFloat(krw);
  return (!isNaN(v) && v > 0) ? Math.round(v * rate) : 0;
}

function autoCalcProfit(cost, sellInput, profitInput, badge) {
  const sell = parseFloat(sellInput.value);
  if (!isNaN(sell) && sell > 0 && cost > 0) {
    profitInput.value = sell - cost;
  } else {
    profitInput.value = '';
  }
  updateStyle(profitInput, badge);
}

function updateStyle(profitInput, badge) {
  const profit = parseFloat(profitInput.value);
  profitInput.classList.remove('profit-pos', 'profit-neg');
  badge.style.display = 'none';

  if (!isNaN(profit)) {
    if (profit >= 0) {
      profitInput.classList.add('profit-pos');
      // 算利潤率（需要找售價）
      const card = profitInput.closest('.item-card');
      const sell = parseFloat(card.querySelector('.sell-input').value);
      if (sell > 0) {
        const pct = ((profit / sell) * 100).toFixed(1);
        badge.textContent = `利潤率 ${pct}%`;
        badge.className = 'margin-badge margin-pos';
        badge.style.display = 'inline-block';
      }
    } else {
      profitInput.classList.add('profit-neg');
      badge.textContent = '⚠️ 虧損';
      badge.className = 'margin-badge margin-neg';
      badge.style.display = 'inline-block';
    }
  }
}

// ── 重新計算所有卡片後更新總計 ──
function recalcAll() {
  // 先更新每張卡片的成本顯示（因為匯率可能改了）
  document.querySelectorAll('.item-card').forEach(card => {
    const krwInput    = card.querySelector('.krw-input');
    const sellInput   = card.querySelector('.sell-input');
    const profitInput = card.querySelector('.profit-input');
    const costTwd     = card.querySelector('.cost-twd');
    const badge       = card.querySelector('.margin-badge');
    const cost = calcCost(krwInput.value);
    costTwd.textContent = cost > 0 ? cost.toLocaleString() : '0';
    if (!profitInput.dataset.manual) {
      autoCalcProfit(cost, sellInput, profitInput, badge);
    }
    updateStyle(profitInput, badge);
  });

  // 加總
  let totalCost = 0, totalSell = 0, totalProfit = 0;
  let hasCost = false, hasSell = false, hasProfit = false;

  document.querySelectorAll('.item-card').forEach(card => {
    const cost   = calcCost(card.querySelector('.krw-input').value);
    const sell   = parseFloat(card.querySelector('.sell-input').value) || 0;
    const profit = parseFloat(card.querySelector('.profit-input').value);

    if (cost > 0)       { totalCost   += cost;   hasCost   = true; }
    if (sell > 0)       { totalSell   += sell;   hasSell   = true; }
    if (!isNaN(profit)) { totalProfit += profit; hasProfit = true; }
  });

  const costEl   = document.getElementById('total-cost');
  const sellEl   = document.getElementById('total-sell');
  const profitEl = document.getElementById('total-profit');

  costEl.textContent   = hasCost   ? `NT$ ${totalCost.toLocaleString()}`   : '－';
  sellEl.textContent   = hasSell   ? `NT$ ${totalSell.toLocaleString()}`   : '－';
  profitEl.textContent = hasProfit ? `NT$ ${totalProfit.toLocaleString()}` : '－';
  profitEl.className   = 'summary-value total ' + (totalProfit >= 0 ? 'pos' : 'neg');
}

// ── 抽屜 ──
function toggleDrawer() { document.body.classList.toggle('drawer-open'); }
function closeDrawer()  { document.body.classList.remove('drawer-open'); }
document.getElementById('drawer').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientX < 50) closeDrawer();
}, { passive: true });

fetchRate();
</script>
</body>
</html>
